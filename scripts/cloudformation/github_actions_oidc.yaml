Parameters:
  GitHubOrg:
    Type: String
  RepositoryName:
    Type: String
  RoleName:
    Type: String
    Default: "github-actions-oidc-pyathena"
  SparkRoleName:
    Type: String
    Default: "pyathena-spark"
  BucketName:
    Type: String
  WorkGroupName:
    Type: String
    Default: "pyathena"
  SparkWorkGroupName:
    Type: String
    Default: "pyathena-spark"
  ManagedWorkGroupName:
    Type: String
    Default: "pyathena-managed"
  S3TablesBucketName:
    Type: String
    Default: "laughingman7743-pyathena-s3-tables"
    Description: Name of the Amazon S3 Tables table bucket used by the SQLAlchemy S3 Tables tests.
  S3TablesNamespaceName:
    Type: String
    Default: "pyathena"
    Description: Namespace created in the S3 Tables table bucket for the SQLAlchemy S3 Tables tests.
  OIDCProviderArn:
    Type: String
    Default: ""
    Description: Arn for the GitHub OIDC Provider.

Conditions:
  CreateOIDCProvider: !Equals
    - !Ref OIDCProviderArn
    - ""

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleName}"
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GithubOidc
                - !Ref OIDCProviderArn
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${RepositoryName}:*"
      Policies:
        - PolicyName: athena-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "athena:*"
                ]
                Resource: [
                  "*"
                ]
        - PolicyName: glue-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "glue:CreateDatabase",
                  "glue:DeleteDatabase",
                  "glue:GetDatabase",
                  "glue:GetDatabases",
                  "glue:UpdateDatabase",
                  "glue:CreateTable",
                  "glue:DeleteTable",
                  "glue:BatchDeleteTable",
                  "glue:UpdateTable",
                  "glue:GetTable",
                  "glue:GetTables",
                  "glue:BatchCreatePartition",
                  "glue:CreatePartition",
                  "glue:DeletePartition",
                  "glue:BatchDeletePartition",
                  "glue:UpdatePartition",
                  "glue:GetPartition",
                  "glue:GetPartitions",
                  "glue:BatchGetPartition"
                ]
                Resource: [
                  "*"
                ]
        - PolicyName: s3-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "s3:GetBucketLocation",
                  "s3:GetObject",
                  "s3:GetObjectTagging",
                  "s3:GetObjectVersion",
                  "s3:ListBucket",
                  "s3:ListBucketVersions",
                  "s3:ListBucketMultipartUploads",
                  "s3:ListMultipartUploadParts",
                  "s3:AbortMultipartUpload",
                  "s3:CreateBucket",
                  "s3:PutObject",
                  "s3:PutObjectTagging",
                  "s3:PutBucketPublicAccessBlock",
                  "s3:DeleteObject"
                ]
                Resource: [
                  !Sub "arn:aws:s3:::${BucketName}*"
                ]
        - PolicyName: s3-list-bucket
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "s3:ListBucket",
                  "s3:ListAllMyBuckets"
                ]
                Resource: [
                  !Sub "arn:aws:s3:::*"
                ]
        - PolicyName: s3tables-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Amazon S3 Tables data plane: create/query/drop namespaces and
              # tables in the table bucket used by the SQLAlchemy S3 Tables tests.
              - Effect: Allow
                Action: [
                  "s3tables:*"
                ]
                Resource: [
                  !Sub "arn:aws:s3tables:${AWS::Region}:${AWS::AccountId}:bucket/*"
                ]
              # Resolve the federated `s3tablescatalog` Glue catalog and obtain
              # Lake Formation data access when querying S3 Tables from Athena.
              - Effect: Allow
                Action: [
                  "glue:GetCatalog",
                  "glue:GetCatalogs",
                  "lakeformation:GetDataAccess"
                ]
                Resource: [
                  "*"
                ]
  SparkRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${SparkRoleName}"
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              Service: "athena.amazonaws.com"
            Condition:
              StringEquals:
                "aws:SourceAccount": !Sub "${AWS::AccountId}"
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${SparkWorkGroupName}"
      Policies:
        - PolicyName: athena-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "athena:GetWorkGroup",
                  "athena:TerminateSession",
                  "athena:GetSession",
                  "athena:GetSessionStatus",
                  "athena:ListSessions",
                  "athena:StartCalculationExecution",
                  "athena:GetCalculationExecutionCode",
                  "athena:StopCalculationExecution",
                  "athena:ListCalculationExecutions",
                  "athena:GetCalculationExecution",
                  "athena:GetCalculationExecutionStatus",
                  "athena:ListExecutors",
                  "athena:ExportNotebook",
                  "athena:UpdateNotebook"
                ]
                Resource: [
                  !Sub "arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${SparkWorkGroupName}"
                ]
        - PolicyName: glue-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "glue:CreateDatabase",
                  "glue:DeleteDatabase",
                  "glue:GetDatabase",
                  "glue:GetDatabases",
                  "glue:UpdateDatabase",
                  "glue:CreateTable",
                  "glue:DeleteTable",
                  "glue:BatchDeleteTable",
                  "glue:UpdateTable",
                  "glue:GetTable",
                  "glue:GetTables",
                  "glue:BatchCreatePartition",
                  "glue:CreatePartition",
                  "glue:DeletePartition",
                  "glue:BatchDeletePartition",
                  "glue:UpdatePartition",
                  "glue:GetPartition",
                  "glue:GetPartitions",
                  "glue:BatchGetPartition"
                ]
                Resource: [
                  "*"
                ]
        - PolicyName: s3-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "s3:PutObject",
                  "s3:ListBucket",
                  "s3:DeleteObject",
                  "s3:GetObject"
                ]
                Resource: [
                  !Sub "arn:aws:s3:::${BucketName}*"
                ]
        - PolicyName: cloudwatch-log-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [
                  "logs:CreateLogStream",
                  "logs:DescribeLogStreams",
                  "logs:CreateLogGroup",
                  "logs:PutLogEvents"
                ]
                Resource: [
                  !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-athena:*",
                  !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-athena*:log-stream:*"
                ]
              - Effect: Allow
                Action: [
                  "logs:DescribeLogGroups"
                ]
                Resource: [
                  !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
                ]

  WorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${WorkGroupName}"
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: false
        RequesterPaysEnabled: false
        EngineVersion:
          SelectedEngineVersion: "Athena engine version 3"
        ResultConfiguration:
          OutputLocation: !Sub "s3://${BucketName}/workgroup=${WorkGroupName}/"

  SparkWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${SparkWorkGroupName}"
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: false
        RequesterPaysEnabled: false
        EngineVersion:
          SelectedEngineVersion: "PySpark engine version 3"
        ResultConfiguration:
          OutputLocation: !Sub "s3://${BucketName}/workgroup=${SparkWorkGroupName}/"
        ExecutionRole: !GetAtt SparkRole.Arn

  ManagedWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ManagedWorkGroupName}"
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: false
        RequesterPaysEnabled: false
        EngineVersion:
          SelectedEngineVersion: "Athena engine version 3"
        ManagedQueryResultsConfiguration:
          Enabled: true

  # S3 staging bucket for Athena query results and test data. Created outside
  # CloudFormation and imported into the stack. Retain on delete/replace so the
  # bucket and its data survive stack operations.
  # NOTE: Because the bucket is retained, recreating the stack from scratch will
  # fail with an AlreadyExists error on this resource; re-import it instead
  # (create-change-set --change-set-type IMPORT --resources-to-import ...).
  S3StagingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${BucketName}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: delete
            Status: Enabled
            ExpirationInDays: 1
            NoncurrentVersionExpiration:
              NoncurrentDays: 1
              NewerNoncurrentVersions: 1
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  # Amazon S3 Tables infrastructure for the SQLAlchemy S3 Tables tests.
  # UnreferencedFileRemoval garbage-collects files left behind by dropped test
  # tables; 1 day is the most aggressive setting to keep test storage costs low.
  S3TablesBucket:
    Type: AWS::S3Tables::TableBucket
    Properties:
      TableBucketName: !Sub "${S3TablesBucketName}"
      UnreferencedFileRemoval:
        Status: Enabled
        UnreferencedDays: 1
        NoncurrentDays: 1

  S3TablesNamespace:
    Type: AWS::S3Tables::Namespace
    Properties:
      TableBucketARN: !GetAtt S3TablesBucket.TableBucketARN
      Namespace: !Sub "${S3TablesNamespaceName}"

  # One-time, per-Region integration: register S3 Tables into the Glue Data
  # Catalog as the federated `s3tablescatalog` catalog so Athena can query them.
  # IAM_ALLOWED_PRINCIPALS default permissions select IAM-based access control
  # (no Lake Formation grants needed; the OIDC role's IAM policy governs access).
  S3TablesCatalog:
    Type: AWS::Glue::Catalog
    Properties:
      Name: s3tablescatalog
      Description: Federated catalog that maps S3 Tables into the Glue Data Catalog
      FederatedCatalog:
        Identifier: !Sub "arn:aws:s3tables:${AWS::Region}:${AWS::AccountId}:bucket/*"
        ConnectionName: aws:s3tables
      CreateDatabaseDefaultPermissions:
        - Principal:
            DataLakePrincipalIdentifier: IAM_ALLOWED_PRINCIPALS
          Permissions:
            - ALL
      CreateTableDefaultPermissions:
        - Principal:
            DataLakePrincipalIdentifier: IAM_ALLOWED_PRINCIPALS
          Permissions:
            - ALL

  GithubOidc:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

Outputs:
  Role:
    Value: !GetAtt Role.Arn
